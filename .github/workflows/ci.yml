name: CI

# Two independent jobs:
#   * tests     — FUNCTIONAL. Pure-Python unit tests (token-bucket math, config loader,
#                 IP<->key round-trip). No root, no BPF, no kernel needed — these actually run.
#   * ebpf-build — COMPILE-ONLY. clang -target bpf produces the XDP object and we assert the
#                 maps/xdp ELF sections exist. GitHub-hosted runners cannot load/attach an XDP
#                 program (no privileged NIC / no live XDP), so this verifies the program
#                 *compiles* — it does not exercise the running filter. Live XDP behavior is
#                 validated manually via the netns lab (see docs/runbooks/) and scripts/load_test.py.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Python unit tests (functional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile all sources
        run: python -m py_compile src/*.py tests/*.py scripts/*.py
      - name: Run unit tests
        run: python -m pytest tests/ -v

  ebpf-build:
    name: Build XDP/eBPF object (compile-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang / llvm / libbpf headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev
      - name: Compile src/fluxguard_kern.c
        run: make build
      - name: Verify BPF ELF sections present (maps + xdp)
        run: |
          llvm-objdump -h src/fluxguard_kern.o | grep -E "maps|xdp"
